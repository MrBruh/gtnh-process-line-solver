# Dependabot keeps the GitHub Actions and Python dependency floors current.
# See https://docs.github.com/code-security/dependabot/dependabot-version-updates.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
