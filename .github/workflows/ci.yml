name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static:
    name: Lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      # Runs the same hooks as local pre-commit: ruff (lint + format), mypy --strict,
      # and file hygiene. Single source of truth for "what static checks mean here".
      - name: pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (requires-python) through latest; the IR/validator must hold across all.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest --cov-fail-under=90

  commits:
    name: Commit messages (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: webiny/action-conventional-commits@v1.3.0
