name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs that need more raise their own scope.
permissions:
  contents: read

# Cancel an in-flight run when a newer commit supersedes it on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      # Runs the same hooks as local pre-commit: ruff (lint + format), mypy --strict,
      # and file hygiene. Single source of truth for "what static checks mean here".
      - name: pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  pytest:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (requires-python) and latest only. The failures worth catching are "used a
        # newer-than-floor feature" and "new release broke us"; when both ends pass, the
        # intermediates do too, so testing them only burns runner minutes and flake surface.
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest --cov-fail-under=90

  # Single stable required status check for branch protection. The matrix produces
  # per-version check names that change whenever the version list changes, so instead of
  # requiring those, require this one `test` gate: it passes only if BOTH the static
  # checks and every matrix leg passed. `if: always()` so a failed dependency still runs
  # the gate and fails it (a skipped required check would otherwise be treated as passing).
  test:
    name: test
    needs: [static, pytest]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on lint/types + the full test matrix
        run: |
          echo "static=${{ needs.static.result }} pytest=${{ needs.pytest.result }}"
          [ "${{ needs.static.result }}" = "success" ] && [ "${{ needs.pytest.result }}" = "success" ]

  commits:
    name: Commit messages (Conventional Commits, advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Advisory only: non-conforming commit messages are surfaced in the logs but do
      # not block the merge. The local commit-msg pre-commit hook is the real nudge.
      - uses: webiny/action-conventional-commits@v1.3.0
        continue-on-error: true
